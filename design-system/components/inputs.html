<!-- @dsCard group="Components" -->
<div style="
  font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
  background: oklch(0.17 0.02 250);
  color: oklch(0.96 0.01 240);
  padding: 32px;
  border-radius: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  max-width: 560px;
">
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:13px;font-weight:500;">Boat name</label>
    <input value="Blue Streak" style="height:36px;padding:0 12px;border-radius:8px;background:transparent;color:oklch(0.96 0.01 240);border:1px solid rgba(255,255,255,0.15);font-size:14px;font-family:inherit;" />
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:13px;font-weight:500;">Sail number</label>
    <input value="USA 4471" style="height:36px;padding:0 12px;border-radius:8px;background:transparent;color:oklch(0.96 0.01 240);border:1px solid rgba(255,255,255,0.15);font-size:14px;font-family:inherit;" />
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="font-size:13px;font-weight:500;">Class</label>
    <input value="J/70" style="height:36px;padding:0 12px;border-radius:8px;background:transparent;color:oklch(0.96 0.01 240);border:1px solid oklch(0.64 0.14 240);box-shadow:0 0 0 3px color-mix(in oklch, oklch(0.64 0.14 240) 25%, transparent);font-size:14px;font-family:inherit;" />
  </div>
  <div style="display:flex;align-items:end;">
    <button style="height:36px;padding:0 16px;border-radius:8px;border:none;font-size:14px;font-weight:500;background:oklch(0.64 0.14 240);color:oklch(0.16 0.03 250);cursor:pointer;">Save changes</button>
  </div>
</div>
