<!-- @dsCard group="Components" -->
<div style="
  font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
  background: oklch(0.17 0.02 250);
  padding: 32px;
  border-radius: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
">
  <button style="height:32px;padding:0 14px;border-radius:8px;border:none;font-size:14px;font-weight:500;background:oklch(0.64 0.14 240);color:oklch(0.16 0.03 250);cursor:pointer;">Primary</button>
  <button style="height:32px;padding:0 14px;border-radius:8px;font-size:14px;font-weight:500;background:transparent;color:oklch(0.96 0.01 240);border:1px solid rgba(255,255,255,0.14);cursor:pointer;">Outline</button>
  <button style="height:32px;padding:0 14px;border-radius:8px;border:none;font-size:14px;font-weight:500;background:oklch(0.27 0.03 250);color:oklch(0.96 0.01 240);cursor:pointer;">Secondary</button>
  <button style="height:32px;padding:0 14px;border-radius:8px;border:none;font-size:14px;font-weight:500;background:transparent;color:oklch(0.96 0.01 240);cursor:pointer;">Ghost</button>
  <button style="height:32px;padding:0 14px;border-radius:8px;font-size:14px;font-weight:500;background:color-mix(in oklch, oklch(0.704 0.191 22.216) 12%, transparent);color:oklch(0.704 0.191 22.216);border:1px solid color-mix(in oklch, oklch(0.704 0.191 22.216) 30%, transparent);cursor:pointer;">Delete</button>
  <button style="height:36px;padding:0 18px;border-radius:8px;border:none;font-size:15px;font-weight:500;background:oklch(0.64 0.14 240);color:oklch(0.16 0.03 250);cursor:pointer;">Large</button>
  <button style="height:32px;width:32px;border-radius:8px;font-size:14px;background:transparent;color:oklch(0.96 0.01 240);border:1px solid rgba(255,255,255,0.14);cursor:pointer;">↺</button>
</div>
