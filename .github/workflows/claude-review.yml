name: Claude Review

# One advisory review when a PR opens or leaves draft — deliberately mirroring
# the Copilot ruleset on main (review_draft_pull_requests: false,
# review_on_push: false). `synchronize` is omitted on purpose: re-reviewing
# every push would spend the shared Claude subscription rate limit without
# adding much, and it would break parity with the other reviewers.
on:
  pull_request:
    types: [opened, ready_for_review]

# Only the newest run per PR needs to finish.
concurrency:
  group: claude-review-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: review
    runs-on: ubuntu-latest
    # Fork PRs get no secrets on a `pull_request` trigger, so the token would be
    # empty and the run would fail noisily on every outside contribution — skip
    # instead. Do NOT switch to `pull_request_target` to work around this: it
    # would hand repository secrets to untrusted PR code.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 1

      - name: Review pull request
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        with:
          # Minted by `claude setup-token`; bills to the Claude subscription
          # rather than API credits. The token expires after a year — when this
          # step starts failing to authenticate, re-run `claude setup-token` and
          # update the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          # Claude reads AGENTS.md (and the nearest directory-level one) on its
          # own, so this prompt points at the repo's rules instead of restating
          # them and drifting out of sync.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request as an advisory reviewer. Follow the golden
            rules and the "Security must-dos" in AGENTS.md, plus the AGENTS.md
            nearest each file you touch.

            Weight the findings toward this repo's real failure modes:
            - RLS: every new table has it enabled and scoped with the
              `(select auth.uid())` idiom; no anonymous policies.
            - The admin/service-role client bypasses RLS, so every call site
              must authorize (membership, organizer, or admin) before using it.
            - No secret ever reaches a `NEXT_PUBLIC_` variable.
            - Post-auth redirects go through `getSafeNextPath`.
            - Next.js 16 conventions (request interception is `src/proxy.ts`,
              route handler `params` is a Promise) — not older Next idioms.
            - Migrations stay additive/backward-compatible, and a schema change
              regenerates `src/lib/supabase/database.types.ts`.

            Report only what you are confident is a real problem, and say
            plainly when you find nothing material. Do not restate what CI
            already enforces (lint, typecheck, test, build) — `verify` owns
            that. Use inline comments for specific issues and one top-level
            comment for the summary. Every inline comment must be resolved
            before merge, so do not open a thread for a nitpick.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
