name: Apply Supabase migrations

# Applies pending migrations to the linked Supabase project after they merge
# to main. Additive migrations only — see supabase/AGENTS.md.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"

# Never run twice at once against the same database.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: mmyogyxvgwfmrqjcsguz
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Supabase CI secrets are not set — skipping migration apply."
            echo "Add SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD in repo Settings → Secrets → Actions to enable."
            exit 0
          fi
          supabase link --project-ref "$PROJECT_REF"
          supabase db push
