# Apply pending Supabase migrations when they land on main.
# Requires repo secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD.
# Project ref is public (see README / CLAUDE.md).

name: Supabase Migrate

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    name: db push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # sailing project — same ref as README / npx supabase link
      SUPABASE_PROJECT_ID: mmyogyxvgwfmrqjcsguz

    steps:
      - name: Check secrets
        run: |
          missing=
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then missing="$missing SUPABASE_ACCESS_TOKEN"; fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then missing="$missing SUPABASE_DB_PASSWORD"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Actions secrets:$missing"
            echo "Add them under Settings → Secrets and variables → Actions."
            echo "Token: https://supabase.com/dashboard/account/tokens"
            echo "DB password: Project Settings → Database"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push
