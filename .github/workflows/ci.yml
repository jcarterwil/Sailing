name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Only the newest run per branch/PR needs to finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Public PRs are untrusted input. This GitHub-owned action uses the
      # dependency graph to reject newly introduced moderate-or-higher
      # vulnerabilities without exposing repository secrets.
      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime, development, unknown

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # lint -> typecheck -> test -> build. The build only needs the public env
      # vars to be *present* (see src/lib/supabase/env.ts); these are inert
      # placeholders, never real credentials. Server secrets are read at request
      # time, not during the build, so none are needed here. The Examples-gated
      # golden test is skipped in CI (the Examples/ dir is git-ignored).
      - run: npm run verify
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
          NEXT_PUBLIC_SITE_URL: https://sailing-performance.vercel.app
          NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "false"
          IMPERSONATION_COOKIE_SECRET: ci_placeholder_impersonation_secret
